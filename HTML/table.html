<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    
<table style="border: 1px solid red; border-collapse: collapse; height: 1000px;" >
    <tr style="background-color: blue; ">
        <th style="border: 1px solid rgb(0, 255, 208); padding: 10px;">Name</th>
        <th style="border: 1px solid red;">Age</th>
        <th style="border: 1px solid red;">City</th>
    </tr>
    <tr>
        <td>John Doe</td>
        <td>30</td>
        <td rowspan="2">New York</td>
    </tr>
    <tr>
        <td>Jane Smith</td>
        <td>25</td>
        
    </tr>
</table>


</body>
</html>
