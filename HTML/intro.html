    <!-- 
    what is HTML?
    HTML stands for HyperText Markup Language. It is the standard markup language used to create web pages. HTML describes the structure of a web page using a series of elements and tags. These elements can include headings, paragraphs, links, images, and other types of content. HTML is the backbone of the web and is essential for building websites and web applications.


    WHY HTML:
    1. it used to create web pages and web applications.
    2. it provides the structure and layout of a web page.
    3. universal language for web development, supported by all web browsers.

    verssions of HTML:
    1. HTML 1.0: The first version of HTML, released in 1991, which laid the foundation for web development.
    2. HTML 2.0: Released in 1995, it introduced new features such as tables and forms.
    3. HTML 3.2: Released in 1997, it added support for scripting languages and multimedia elements.
    4. HTML 4.01: Released in 1999, it introduced new
features such as CSS and improved support for multimedia.
    5. HTML5: Released in 2014, it is the latest version of HTML and includes new features such as video and audio support, canvas for drawing graphics, and improved support for mobile devices.

    HTML4 vs HTML5:

    1. doctype                HTML4: <!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
                            HTML5: <!DOCTYPE html>
    2. multimedia support     HTML4: Limited support for multimedia elements.
                            HTML5: Native support for audio and video elements.
    3. semantic elements     HTML4: Limited semantic elements.
                            HTML5: Introduces new semantic elements such as <header>, <footer>, <article>, and <section>.
    4. form controls         HTML4: Limited form controls.
                            HTML5: Introduces new form controls such as date pickers, sliders, and color pickers.

    HTML Core Components:
    1. tags
            WHat is tags:
            Tags are the building blocks of HTML. They are used to define the structure and content of a web page. Tags are enclosed in angle brackets (< >) and usually come in pairs, with an opening tag and a closing tag. The opening tag contains the name of the element, while the closing tag is the same as the opening tag but with a forward slash (/) before the name. For example, <p> is an opening tag for a paragraph element, and </p> is the corresponding closing tag.
            syntax of tags:
            <tagName>

    2. elements
            What is elements:
            An element is a complete unit of content in HTML. It consists of an opening tag, content, and a closing tag. For example, <p>This is a paragraph.</p> is an element that represents a paragraph of text. Elements can also be nested inside other elements to create more complex structures. For example, <div><p>This is a paragraph inside a div.</p></div> is an element that contains another element (the paragraph) inside it.
                syntax of elements:
                <tagName> content </tagName>
                types of elements:
                1. block-level elements: These elements start on a new line and take up the full width of their container. Examples include <div>, <p>, <h1>, <ul>, and <table>.
                2. inline elements: These elements do not start on a new line and only take up as much width as necessary. Examples include <span>, <a>, <img>, and <strong>.

    3. attributes
                    
    what is attributes:
Attributes provide additional information about an element. They are included in the opening tag of an element and

syntax:
<tagName attributeName="attributeValue"> content </tagName>
For example, <a href="https://www.example.com">This is a link.</a> is an anchor element with an href attribute that specifies the URL of the link. Attributes can be used to specify various properties of an element, such as its appearance, behavior, or functionality. Some common attributes include id, class, style, and
src.
types of attributes:
1. global attributes: These attributes can be used on any HTML element. Examples include id, class, style, and
title.
2. specific attributes: These attributes are specific to certain HTML elements. For example, the href
    
what is property:
A property is a characteristic or feature of an HTML element that can be manipulated using CSS or JavaScript. Properties define the appearance, behavior, or functionality of an element. For example, the color property can be used to change the text color of an element, while the onclick property can be used to specify a JavaScript function that should be executed when an element is clicked. Properties are typically set using CSS or JavaScript and can be used to create dynamic and interactive web pages.
syntax:
propertyName: propertyValue;
