    <!--
    
    
    order list:
an OL is a list of items in which the order does matter. It is used when we want to display a list of items in a specific sequence. The items in an ordered list are typically numbered or lettered.

syntax:
<ol>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
</ol>


use cases:
1. Roll numbers
2. Rankings
3. Steps in a process
4. work priority


2. unorder list:
an UL is a list of items in which the order does not matter. It is used when we want to display a list of items without any specific sequence. The items in an unordered list are typically marked with bullets or other symbols.

syntax:
<ul>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
</ul>

use cases:
1. Grocery lists
2. To-do lists
3. menu items


    -->
