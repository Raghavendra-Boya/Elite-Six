    <style>
        .card1{
            width:300px;
            height: 400px;
            overflow: hidden;
            border-radius: 30px;
            position: relative;

        }
        .card1 img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-details{
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background-color: rgb(98, 97, 97);
            color: white;
            padding: 20px;
            transform: translateY(100%);
            transition-duration: 2s;
        }
        .card1:hover .card-details{
            transform:translate(0%)
        }
    </style>
</head>
