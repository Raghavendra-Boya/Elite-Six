  <!--
  what is Positions:
  
  CSS positions are used to place the elements where should apper on the web page. There are five types of positions in CSS:

  types of positions:
  1. static:
    The default position for all elements is static. Elements with static positioning are positioned according to the normal flow of the document. They are not affected by top, bottom, left, or right properties.
    top,bottom,left,right properties will not work on static positioned elements.

    2. relative:
    Elements with relative positioning are positioned relative to their normal position in the document flow. They can be moved using the top, bottom, left, and right properties, but they still take up space in the layout as if they were in their original position.


  -->  

  <div style="position: fixed; left: 300px; top:500px">Static</div>
  <div class="box relative">Relative</div>
